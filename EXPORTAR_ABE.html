<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>📤 Exportar AbeBooks — Libros Bosch</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --negro:#1a1a1a; --dorado:#c8640a; --dorado-l:#e07010; --verde:#2d6a4f; --rojo:#b33a2a; --borde:#ccc; --fondo:#f5f5f5; --muted:#888; }
    body { font-family:Arial,Helvetica,sans-serif; background:var(--fondo); color:var(--negro); padding:20px; font-size:15px; line-height:1.5; }
    .header { background:var(--negro); color:white; padding:20px 32px; margin-bottom:24px; border-bottom:3px solid var(--dorado); }
    .header h1 { font-size:1.6rem; font-weight:700; margin-bottom:2px; }
    .header p { font-size:.9rem; opacity:.7; }
    .header-nav { display:flex; gap:20px; margin-top:12px; }
    .header-nav a { color:white; opacity:.6; font-size:.85rem; text-transform:uppercase; text-decoration:none; padding:4px 0; border-bottom:2px solid transparent; transition:all .2s; }
    .header-nav a:hover { opacity:1; border-bottom-color:var(--dorado); }
    .card { background:white; padding:24px; border:1px solid var(--borde); margin-bottom:20px; }
    .card-title { font-size:1rem; font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:8px; border-bottom:2px solid var(--borde); padding-bottom:12px; text-transform:uppercase; }
    .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
    .stat { background:var(--fondo); padding:16px; border:1px solid var(--borde); border-top:3px solid var(--dorado); text-align:center; }
    .stat .val { font-size:2rem; font-weight:700; }
    .stat .lab { font-size:.75rem; text-transform:uppercase; color:var(--muted); margin-top:4px; }
    .btn { padding:10px 24px; border:1px solid var(--borde); font-size:.95rem; font-weight:700; cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:8px; font-family:Arial,sans-serif; background:white; color:var(--negro); }
    .btn:hover { background:var(--fondo); }
    .btn-primary { background:var(--dorado); color:white; border-color:var(--dorado); }
    .btn-primary:hover { background:var(--dorado-l); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .progreso-wrap { margin:16px 0; display:none; }
    .progreso-barra { height:8px; background:#eee; }
    .progreso-fill { height:100%; background:var(--dorado); transition:width .3s; width:0%; }
    .progreso-texto { font-size:.85rem; color:var(--muted); margin-top:6px; }
    .aviso { padding:12px 16px; border-left:3px solid var(--dorado); background:#fff8f0; font-size:.88rem; margin-bottom:16px; }
    .aviso.verde { border-left-color:var(--verde); background:#e8f5e9; }
    .aviso.rojo { border-left-color:var(--rojo); background:#fce4e4; }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--negro); color:white; padding:10px 22px; font-size:.9rem; font-weight:700; z-index:9999; border-bottom:2px solid var(--dorado); transition:transform .25s; }
    .toast.visible { transform:translateX(-50%) translateY(0); }
    .toast.error { border-bottom-color:var(--rojo); }
    .flex { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .mt { margin-top:16px; }
    label { display:block; font-size:.78rem; font-weight:700; text-transform:uppercase; color:#555; margin-bottom:4px; }
    select, input[type=text] { width:100%; padding:8px 12px; border:1px solid var(--borde); font-size:.92rem; font-family:Arial,sans-serif; }
    select:focus, input:focus { outline:none; border-color:var(--dorado); }
    .opciones-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
  </style>
</head>
<body>

<div class="header">
  <h1>📤 Exportar a AbeBooks — Libros Bosch</h1>
  <p>Genera el CSV listo para subir a AbeBooks/Iberlibro</p>
  <nav class="header-nav">
    <a href="INVENTARIO.html">Inventario</a>
    <a href="CLIENTES.html">Clientes</a>
    <a href="IMPORTAR.html">Importar</a>
  </nav>
</div>

<div class="card">
  <div class="card-title">⚙️ Opciones de exportación</div>
  <div class="opciones-grid">
    <div>
      <label>Incluir tipos</label>
      <select id="filtroTipo">
        <option value="">Todos los tipos</option>
        <option value="Libro">Solo Libros</option>
        <option value="Fotografía">Fotografías</option>
        <option value="Grabado">Grabados</option>
        <option value="Mapa">Mapas</option>
        <option value="Manuscrito">Manuscritos</option>
        <option value="Revista">Revistas</option>
        <option value="Otro">Otros</option>
      </select>
    </div>
    <div>
      <label>Solo con precio</label>
      <select id="filtroConPrecio">
        <option value="si">Sí — excluir sin precio</option>
        <option value="no">No — incluir todos</option>
      </select>
    </div>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat">
      <div class="val" id="stTotal">—</div>
      <div class="lab">Total en Supabase</div>
    </div>
    <div class="stat">
      <div class="val" id="stExportar">—</div>
      <div class="lab">A exportar</div>
    </div>
    <div class="stat">
      <div class="val" id="stOmitidos">—</div>
      <div class="lab">Omitidos (sin precio)</div>
    </div>
  </div>

  <div class="progreso-wrap" id="progresoWrap">
    <div class="progreso-barra"><div class="progreso-fill" id="progresoFill"></div></div>
    <div class="progreso-texto" id="progresoTexto">Cargando datos...</div>
  </div>

  <div id="avisoDiv"></div>

  <div class="flex mt">
    <button class="btn btn-primary" id="btnExportar" onclick="exportar()" disabled>📥 Generar CSV AbeBooks</button>
    <button class="btn" onclick="previsualizar()">↺ Actualizar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL  = 'https://ohlrldyobyxurnkwheli.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9obHJsZHlvYnl4dXJua3doZWxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjEwNTEsImV4cCI6MjA4OTU5NzA1MX0.GcK2rk3gyPf0MeaoMgnQeuUfRMwEgr1SbUw6Md6AWCU';
const API = SUPABASE_URL + '/rest/v1';
const HEADERS = { 'apikey':SUPABASE_ANON, 'Authorization':'Bearer '+SUPABASE_ANON };

let todosRegistros = [];

// Mapeo encuadernación → AbeBooks
const ABEBOOKS_MAP = {
  'Rústica':'Encuadernación de tapa blanda',
  'Rústica con solapas':'Encuadernación de tapa blanda',
  'Editorial con solapas':'Encuadernación de tapa blanda',
  'Cartoné':'Encuadernación de tapa dura',
  'Tela editorial':'Encuadernación de tapa dura',
  'Tela ed. estampada':'Encuadernación de tapa dura',
  'Holandesa':'Encuadernación de tapa dura',
  'Holandesa puntas':'Encuadernación de tapa dura',
  'Pasta española':'Encuadernación de tapa dura',
};

async function cargarTodos() {
  const LOTE = 1000;
  let offset = 0, todos = [];
  document.getElementById('progresoWrap').style.display = 'block';
  document.getElementById('btnExportar').disabled = true;
  try {
    while (true) {
      document.getElementById('progresoTexto').textContent = 'Cargando registros... ' + todos.length;
      const res = await fetch(`${API}/inventario?select=stock_no,tipo,autor,titulo,descripcion,lugar,editorial,fecha,precio,isbn,encuadernacion,encuadernacion_abebooks,estado,materia,materia2&order=stock_no.asc&offset=${offset}&limit=${LOTE}`, {
        headers: { ...HEADERS, 'Range': `${offset}-${offset+LOTE-1}` }
      });
      if (!res.ok) throw new Error(await res.text());
      const lote = await res.json();
      if (!lote || !lote.length) break;
      todos = todos.concat(lote);
      if (lote.length < LOTE) break;
      offset += LOTE;
    }
    todosRegistros = todos;
    document.getElementById('stTotal').textContent = todos.length.toLocaleString('es-ES');
    actualizarStats();
    document.getElementById('btnExportar').disabled = false;
    toast('✓ ' + todos.length + ' registros cargados');
  } catch(e) {
    toast('Error al cargar: ' + e.message, true);
  } finally {
    document.getElementById('progresoWrap').style.display = 'none';
  }
}

function actualizarStats() {
  const tipo = document.getElementById('filtroTipo').value;
  const conPrecio = document.getElementById('filtroConPrecio').value === 'si';
  let filtrados = todosRegistros;
  if (tipo) filtrados = filtrados.filter(r => r.tipo === tipo);
  const sinPrecio = filtrados.filter(r => !r.precio).length;
  if (conPrecio) filtrados = filtrados.filter(r => r.precio);
  document.getElementById('stExportar').textContent = filtrados.length.toLocaleString('es-ES');
  document.getElementById('stOmitidos').textContent = conPrecio ? sinPrecio : 0;
}

function previsualizar() { actualizarStats(); }

document.getElementById('filtroTipo').addEventListener('change', actualizarStats);
document.getElementById('filtroConPrecio').addEventListener('change', actualizarStats);

function exportar() {
  const tipo = document.getElementById('filtroTipo').value;
  const conPrecio = document.getElementById('filtroConPrecio').value === 'si';

  let registros = todosRegistros;
  if (tipo) registros = registros.filter(r => r.tipo === tipo);
  if (conPrecio) registros = registros.filter(r => r.precio);

  if (!registros.length) return toast('No hay registros para exportar', true);

  // Construir CSV en formato AbeBooks (igual que Booksell)
  // 14 columnas: stock, tipo, autor, titulo, vacío, descripcion, lugar:editorial, fecha, €precio, isbn, encuadernacion_abe, estado, materia, materia2
  const lineas = registros.map(r => {
    // Lugar + editorial juntos: "Madrid: Alianza"
    const lugarEd = r.lugar && r.editorial ? `${r.lugar}: ${r.editorial}`
                  : r.lugar ? r.lugar
                  : r.editorial ? r.editorial
                  : '';

    // Encuadernación AbeBooks: usar el campo directo si existe, si no mapear desde encuadernacion
    const encAbe = r.encuadernacion_abebooks
      ? (r.encuadernacion_abebooks === 'Tapa dura' ? 'Encuadernación de tapa dura'
         : r.encuadernacion_abebooks === 'Tapa blanda' ? 'Encuadernación de tapa blanda'
         : r.encuadernacion_abebooks)
      : (ABEBOOKS_MAP[r.encuadernacion] || '');

    // Precio con símbolo €
    const precio = r.precio != null ? '€' + r.precio : '';

    // Tipo normalizado
    const tipo = r.tipo || 'Libros';
    const tipoAbe = tipo === 'Libro' ? 'Libros' : tipo;

    const cols = [
      r.stock_no || '',
      tipoAbe,
      r.autor || '',
      r.titulo || '',
      '',
      r.descripcion || '',
      lugarEd,
      r.fecha || '',
      precio,
      r.isbn || '',
      encAbe,
      r.estado || '',
      r.materia || '',
      r.materia2 || ''
    ];

    return cols.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',');
  });

  const csv = lineas.join('\r\n');

  // Convertir a Windows-1252
  descargarCSV(csv, 'catalogo_abebooks_' + fechaHoy() + '.csv');
  toast('✓ CSV generado — ' + registros.length + ' registros');
}

function descargarCSV(contenido, nombre) {
  // Intentar Windows-1252 via TextEncoder si disponible, si no UTF-8
  try {
    const encoder = new TextEncoder();
    // Convertir manualmente caracteres españoles a Windows-1252
    const w1252 = toWindows1252(contenido);
    const blob = new Blob([w1252], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = nombre;
    a.click(); URL.revokeObjectURL(url);
  } catch(e) {
    // Fallback: descargar como UTF-8
    const blob = new Blob([contenido], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = nombre;
    a.click(); URL.revokeObjectURL(url);
  }
}

function toWindows1252(str) {
  const buf = new Uint8Array(str.length * 2);
  let j = 0;
  const map = {
    '€':0x80,'‚':0x82,'ƒ':0x83,'„':0x84,'…':0x85,'†':0x86,'‡':0x87,'ˆ':0x88,'‰':0x89,
    'Š':0x8A,'‹':0x8B,'Œ':0x8C,'Ž':0x8E,''':0x91,''':0x92,'â€œ':0x93,'"':0x94,'•':0x95,
    '–':0x96,'—':0x97,'˜':0x98,'™':0x99,'š':0x9A,'›':0x9B,'œ':0x9C,'ž':0x9E,'Ÿ':0x9F,
    '\u00A0':0xA0,'¡':0xA1,'¢':0xA2,'£':0xA3,'¤':0xA4,'¥':0xA5,'¦':0xA6,'§':0xA7,
    '¨':0xA8,'©':0xA9,'ª':0xAA,'«':0xAB,'¬':0xAC,'­':0xAD,'®':0xAE,'¯':0xAF,
    '°':0xB0,'±':0xB1,'²':0xB2,'³':0xB3,'´':0xB4,'µ':0xB5,'¶':0xB6,'·':0xB7,
    '¸':0xB8,'¹':0xB9,'º':0xBA,'»':0xBB,'¼':0xBC,'½':0xBD,'¾':0xBE,'¿':0xBF,
    'À':0xC0,'Á':0xC1,'Â':0xC2,'Ã':0xC3,'Ä':0xC4,'Å':0xC5,'Æ':0xC6,'Ç':0xC7,
    'È':0xC8,'É':0xC9,'Ê':0xCA,'Ë':0xCB,'Ì':0xCC,'Í':0xCD,'Î':0xCE,'Ï':0xCF,
    'Ð':0xD0,'Ñ':0xD1,'Ò':0xD2,'Ó':0xD3,'Ô':0xD4,'Õ':0xD5,'Ö':0xD6,'×':0xD7,
    'Ø':0xD8,'Ù':0xD9,'Ú':0xDA,'Û':0xDB,'Ü':0xDC,'Ý':0xDD,'Þ':0xDE,'ß':0xDF,
    'à':0xE0,'á':0xE1,'â':0xE2,'ã':0xE3,'ä':0xE4,'å':0xE5,'æ':0xE6,'ç':0xE7,
    'è':0xE8,'é':0xE9,'ê':0xEA,'ë':0xEB,'ì':0xEC,'í':0xED,'î':0xEE,'ï':0xEF,
    'ð':0xF0,'ñ':0xF1,'ò':0xF2,'ó':0xF3,'ô':0xF4,'õ':0xF5,'ö':0xF6,'÷':0xF7,
    'ø':0xF8,'ù':0xF9,'ú':0xFA,'û':0xFB,'ü':0xFC,'ý':0xFD,'þ':0xFE,'ÿ':0xFF
  };
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    const code = str.charCodeAt(i);
    if (code < 128) { buf[j++] = code; }
    else if (map[c] !== undefined) { buf[j++] = map[c]; }
    else { buf[j++] = 63; } // '?' para caracteres no mapeables
  }
  return buf.slice(0, j);
}

function fechaHoy() {
  const d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');
}

function toast(msg, error=false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast'+(error?' error':'');
  el.classList.add('visible'); setTimeout(()=>el.classList.remove('visible'), 3000);
}

// Inicio
cargarTodos();
</script>
</body>
</html>
