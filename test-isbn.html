<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test ISBN</title>
</head>
<body>
  <h1>Test ISBN</h1>

  <label for="isbn">ISBN</label>
  <input type="text" id="isbn" value="9780140328721">
  <button id="buscarBtn">Probar función</button>

    <h2>Resultado legible</h2>
  <div><strong>Título:</strong> <span id="rTitulo">—</span></div>
  <div><strong>Autor:</strong> <span id="rAutor">—</span></div>
  <div><strong>Editorial:</strong> <span id="rEditorial">—</span></div>
  <div><strong>Lugar:</strong> <span id="rLugar">—</span></div>
  <div><strong>Fecha:</strong> <span id="rFecha">—</span></div>
  <div><strong>Páginas:</strong> <span id="rPaginas">—</span></div>
  <div><strong>Pie editorial:</strong> <span id="rPieEditorial">—</span></div>
  <div><strong>Paginación:</strong> <span id="rPaginacion">—</span></div>

  <h2>JSON bruto</h2>
  <pre id="resultado">Sin ejecutar</pre>

  <script>
    document.getElementById('buscarBtn').addEventListener('click', async () => {
      const isbn = document.getElementById('isbn').value.trim()
      const resultado = document.getElementById('resultado')

            document.getElementById('rTitulo').textContent = '—'
      document.getElementById('rAutor').textContent = '—'
      document.getElementById('rEditorial').textContent = '—'
      document.getElementById('rLugar').textContent = '—'
      document.getElementById('rFecha').textContent = '—'
      document.getElementById('rPaginas').textContent = '—'
      document.getElementById('rPieEditorial').textContent = '—'
      document.getElementById('rPaginacion').textContent = '—'
      resultado.textContent = 'Consultando...'

      try {
        const res = await fetch('https://ohlrldyobyxurnkwheli.supabase.co/functions/v1/isbn_test', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ isbn })
        })

        const data = await res.json()

                document.getElementById('rTitulo').textContent = data.titulo || '—'
        document.getElementById('rAutor').textContent = data.autor || '—'
        document.getElementById('rEditorial').textContent = data.editorial || '—'
        document.getElementById('rLugar').textContent = data.lugar || '—'
        document.getElementById('rFecha').textContent = data.fecha || '—'
        document.getElementById('rPaginas').textContent = data.paginas ?? '—'
        document.getElementById('rPieEditorial').textContent = data.pie_editorial || '—'
        document.getElementById('rPaginacion').textContent = data.paginacion || '—'

        resultado.textContent = JSON.stringify(data, null, 2)
      } catch (err) {
        resultado.textContent = 'Error: ' + err.message
      }
    })
  </script>
</body>
</html>
